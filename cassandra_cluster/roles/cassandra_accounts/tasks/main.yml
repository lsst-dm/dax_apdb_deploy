---
# tasks file for roles/cassandra_accounts

# Need to distinguish between failures due to docker or failing authentication.
- name: "Check that service is running and can execute cqlsh"
  community.docker.docker_compose_v2_exec:
    service: "{{ service_name }}"
    command: "cqlsh -v"
    project_src: "{{ deploy_docker_folder }}"
    tty: false
  register: result
  failed_when: result.rc != 0

# Check if default cassandra/cassandra credentials are still working.
- name: "Check for default login"
  community.cassandra.cassandra_cqlsh:
    cqlsh_cmd: "{{ deploy_docker_folder }}/cqlsh"
    execute: "SHOW HOST"
    username: cassandra
    password: cassandra
  register: cqlsh_using_default_login
  ignore_errors: true

- name: "Message about missing account"
  when: cqlsh_using_default_login.failed
  ansible.builtin.debug:
    msg: "Default cassandra account is disabled, new accounts probbably exist already."

- name: "Create new Cassandra accounts"
  when: not cqlsh_using_default_login.failed
  block:

    - name: "Ask Vault for cassandra accounts credentials"
      when: credentials_source == "hashi_vault"
      block:
        # Get some secrets from the Vault, runs on localhost, so use lookup
        # plugin instead of module.
        - name: "Ask Vault for superuser cassandra account credentials"
          ansible.builtin.set_fact:
            hashi_response: "{{ lookup('community.hashi_vault.vault_kv2_get', hashi_vault_super_path, mount_point=hashi_vault_mount_point) }}"

        - name: "Extract credentials"
          ansible.builtin.set_fact:
            super_account_username: "{{ hashi_response.data.data.username }}"
            super_account_password: "{{ hashi_response.data.data.password }}"

        - name: "Ask Vault for new cassandra account credentials"
          ansible.builtin.set_fact:
            hashi_response: "{{ lookup('community.hashi_vault.vault_kv2_get', hashi_vault_user_path, mount_point=hashi_vault_mount_point) }}"

        - name: "Extract credentials"
          ansible.builtin.set_fact:
            user_account_username: "{{ hashi_response.data.data.username }}"
            user_account_password: "{{ hashi_response.data.data.password }}"

    - name: "Create new superuser account"
      community.cassandra.cassandra_cqlsh:
        cqlsh_cmd: "{{ deploy_docker_folder }}/cqlsh"
        execute: "CREATE ROLE {{ super_account_username }} WITH PASSWORD = '{{ super_account_password }}' AND LOGIN = true AND SUPERUSER = true"
        username: cassandra
        password: cassandra
      register: cqlsh_result
      failed_when: cqlsh_result.failed

    - name: "Create regular user account"
      community.cassandra.cassandra_cqlsh:
        cqlsh_cmd: "{{ deploy_docker_folder }}/cqlsh"
        execute: "CREATE ROLE {{ user_account_username }} WITH PASSWORD = '{{ user_account_password }}' AND LOGIN = true AND SUPERUSER = false"
        username: cassandra
        password: cassandra
      register: cqlsh_result
      failed_when: cqlsh_result.failed

    - name: "Allow regular user to create new keyspaces and tables"
      community.cassandra.cassandra_cqlsh:
        cqlsh_cmd: "{{ deploy_docker_folder }}/cqlsh"
        execute: "GRANT CREATE ON ALL KEYSPACES TO {{ user_account_username }}"
        username: cassandra
        password: cassandra
      register: cqlsh_result
      failed_when: cqlsh_result.failed

    - name: "Disable old superuser account"
      community.cassandra.cassandra_cqlsh:
        cqlsh_cmd: "{{ deploy_docker_folder }}/cqlsh"
        execute: "ALTER ROLE cassandra WITH SUPERUSER = false AND LOGIN = false"
        username: "{{ super_account_username }}"
        password: "{{ super_account_password }}"
      register: cqlsh_result
      failed_when: cqlsh_result.failed
