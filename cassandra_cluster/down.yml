# Playbook for bringing down Cassandra cluster
---

- name: "Drain and shutdown all Cassandra nodes"
  hosts: "{{ ansible_play_hosts }}"
  gather_facts: false

  tasks:

    - name: "Stop Cassandra service"
      ansible.builtin.import_tasks: up_tasks/down-node.yml

- name: "Stop container"
  hosts: "{{ ansible_play_hosts }}"
  gather_facts: false

  tasks:

    - name: "Stop container"
      community.docker.docker_compose_v2:
        state: absent
        project_src: "{{ deploy_docker_folder }}"
        wait: true
        wait_timeout: 60
